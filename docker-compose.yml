services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agro_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agro_management"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8081
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: agro_management
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  node:
    image: node:22-alpine
    working_dir: /var/www/html
    command: sh -c "if [ ! -d node_modules/vue ]; then npm install; fi && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - node_modules_data:/var/www/html/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
  vendor_data:
  node_modules_data:
